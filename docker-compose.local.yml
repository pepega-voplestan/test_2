version: "3.8"

# Local development — hot-reload, bind mounts, build from source.
# Use: make local

services:
  postgres-dev:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data-dev:/var/lib/postgresql/data
    ports:
      - "6432:5432"
    networks:
      - vopli-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis-dev:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data-dev:/data
    networks:
      - vopli-dev

  api-dev:
    build:
      context: ./api
      target: app
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      MEDIA_PATH: /media
      AVATAR_PATH: /data/avatars
      NODE_ENV: ${NODE_ENV}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: "Вопли <noreply@vopley.net>"
      ANNOUNCEMENTS_SECRET: ${ANNOUNCEMENTS_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      ADMIN_COOKIE_SECRET: ${ADMIN_COOKIE_SECRET}
      REDIS_HOST: redis-dev
      REDIS_PORT: 6379
    volumes:
      - appdata-dev:/data
      - media-dev:/media
      - ./api/src:/app/src:ro
      - ./api/prisma:/app/prisma:ro
    expose:
      - "3000"
    networks:
      - vopli-dev
    depends_on:
      postgres-dev:
        condition: service_healthy
      redis-dev:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

  worker-dev:
    build:
      context: .
      dockerfile: workers/Dockerfile
      target: dev
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: ${NODE_ENV}
      REDIS_HOST: redis-dev
      BULL_BOARD_BASE_PATH: /workers
    volumes:
      - ./workers/src:/app/src:ro
    expose:
      - "3001"
    depends_on:
      redis-dev:
        condition: service_started
      postgres-dev:
        condition: service_healthy
      api-dev:
        condition: service_healthy
    networks:
      - vopli-dev

  media-dev:
    image: nginx:alpine
    volumes:
      - media-dev:/media:ro
      - ./media-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "80"
    networks:
      - vopli-dev

  nginx-dev:
    image: nginx:alpine
    depends_on:
      - api-dev
      - media-dev
      - worker-dev
    ports:
      - "3006:80"
    volumes:
      - ./nginx-dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./.htpasswd:/etc/nginx/.htpasswd:ro
      - webdist-dev:/usr/share/nginx/html:ro
    networks:
      - vopli-dev

  web-build-dev:
    build:
      context: ./web
    volumes:
      - webdist-dev:/out
    command: sh -c "rm -rf /out/* && cp -r /app/dist/* /out/"
    networks:
      - vopli-dev

networks:
  vopli-dev:
    driver: bridge

volumes:
  postgres-data-dev:
  appdata-dev:
  webdist-dev:
  media-dev:
  redis-data-dev:
