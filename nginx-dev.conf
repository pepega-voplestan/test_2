server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Increase max upload size for media (5 MB image + overhead)
  client_max_body_size 6m;

  # прокси на API
  location /api/ {
    proxy_pass http://api-dev:3000;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
  }

  # SSE — disable buffering, long timeout
  location = /api/v1/events {
    proxy_pass http://api-dev:3000;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;

    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 86400s;
  }

  # прокси на медиа-контейнер
  location /media/ {
    proxy_pass http://media-dev:80/;
    proxy_set_header Host $host;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;

    # CSP: allow embeds (YouTube, Coub, Tenor) and external images (Imgur, YouTube thumbnails, Dicebear)
    add_header Content-Security-Policy "frame-src 'self' https://www.youtube-nocookie.com https://www.youtube.com https://coub.com https://tenor.com; img-src 'self' data: https://img.youtube.com https://api.dicebear.com https://i.imgur.com https://media1.tenor.com https://media.tenor.com https://pbs.fxtwitter.com; connect-src 'self' https://api.fxtwitter.com;" always;
  }
}
