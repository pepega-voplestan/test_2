server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Increase max upload size for media (10 MB + overhead)
  client_max_body_size 11m;

  # Swagger UI — blocked in production
  location /api/docs {
    return 404;
  }

  # Bull Board worker dashboard — HTTP basic auth + proxy
  location /workers {
    auth_basic "Workers";
    auth_basic_user_file /etc/nginx/.htpasswd;

    proxy_pass http://worker:3001;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
  }

  # AdminJS admin panel — HTTP basic auth + proxy
  location /admin {
    auth_basic "Admin Area";
    auth_basic_user_file /etc/nginx/.htpasswd;

    proxy_pass http://api:3000;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
  }

  # прокси на API
  location /api/ {
    proxy_pass http://api:3000;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
  }

  # SSE — disable buffering, long timeout
  location = /api/v1/events {
    proxy_pass http://api:3000;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;

    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 86400s;
  }

  # прокси на медиа-контейнер
  location /media/ {
    proxy_pass http://media:80/;
    proxy_set_header Host $host;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;

    # CSP: allow embeds (YouTube, Coub, Tenor, Giphy, Steam) and external images (Imgur, YouTube thumbnails, Dicebear)
    add_header Content-Security-Policy "frame-src 'self' https://www.youtube-nocookie.com https://www.youtube.com https://coub.com https://tenor.com https://giphy.com; img-src 'self' blob: data: https://img.youtube.com https://api.dicebear.com https://i.imgur.com https://media1.tenor.com https://media.tenor.com https://media0.tenor.com https://media2.tenor.com https://media3.tenor.com https://pbs.fxtwitter.com https://cdn.akamai.steamstatic.com https://shared.akamai.steamstatic.com https://media.giphy.com https://media0.giphy.com https://media1.giphy.com https://media2.giphy.com https://media3.giphy.com https://media4.giphy.com https://i.giphy.com; media-src 'self' blob:; connect-src 'self' https://api.fxtwitter.com;" always;
  }
}
