name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: vopley_test
          POSTGRES_PASSWORD: test-secret
          POSTGRES_DB: vopley_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            api/package-lock.json
            web/package-lock.json

      - name: Install API dependencies
        run: npm ci --prefix api

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: api

      - name: Install web dependencies
        run: npm ci --prefix web

      - name: Lint API
        run: npm run lint --prefix api

      - name: Lint web
        run: npm run lint --prefix web

      - name: Run API tests
        run: npm test --prefix api
        env:
          TEST_DATABASE_URL: postgresql://vopley_test:test-secret@localhost:5432/vopley_test

      - name: Run web tests
        run: npm test --prefix web
