version: "3.8"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    networks:
      - vopli

  api:
    image: ${IMAGE_PREFIX}/api:latest
    build:
      context: ./api
      target: app
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      MEDIA_PATH: /media
      NODE_ENV: ${NODE_ENV}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: "Вопли <noreply@vopley.net>"
      ANNOUNCEMENTS_SECRET: ${ANNOUNCEMENTS_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      ADMIN_COOKIE_SECRET: ${ADMIN_COOKIE_SECRET}
    networks:
      - vopli
    volumes:
      - appdata:/data
      - media:/media
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

  worker:
    image: ${IMAGE_PREFIX}/workers:latest
    build:
      context: .
      dockerfile: workers/Dockerfile
      target: app
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: ${NODE_ENV}
      REDIS_HOST: redis
      BULL_BOARD_BASE_PATH: /workers
    volumes:
      - appdata:/data
    expose:
      - "3001"
    depends_on:
      redis:
        condition: service_started
      api:
        condition: service_healthy
    networks:
      - vopli

  media:
    image: nginx:alpine
    volumes:
      - media:/media:ro
      - ./media-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "80"
    networks:
      - vopli

  nginx:
    image: nginx:alpine
    depends_on:
      - api
      - media
      - worker
    ports:
      - "3005:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./.htpasswd:/etc/nginx/.htpasswd:ro
      - webdist:/usr/share/nginx/html:ro
    networks:
      - vopli

  web-build:
    image: ${IMAGE_PREFIX}/web:latest
    build:
      context: ./web
    volumes:
      - webdist:/out
    command: sh -c "rm -rf /out/* && cp -r /app/dist/* /out/"
    networks:
      - vopli

networks:
  vopli:
    driver: bridge

volumes:
  appdata:
  webdist:
  media:
  redis-data:
