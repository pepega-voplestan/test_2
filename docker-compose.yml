version: "3.8"

services:
  api:
    build:
      context: ./api
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      MEDIA_PATH: /media
      NODE_ENV: ${NODE_ENV}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: "Вопли <noreply@vopley.net>"
      ANNOUNCEMENTS_SECRET: ${ANNOUNCEMENTS_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      ADMIN_COOKIE_SECRET: ${ADMIN_COOKIE_SECRET}
    networks:
      - vopli

    volumes:
      - appdata:/data
      - media:/media
    expose:
      - "3000"

  media:
    image: nginx:alpine
    volumes:
      - media:/media:ro
      - ./media-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "80"
    networks:
      - vopli

  nginx:
    image: nginx:alpine
    depends_on:
      - api
      - media
    ports:
      - "3005:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - webdist:/usr/share/nginx/html:ro
    networks:
      - vopli

  web-build:
    build:
      context: ./web
    volumes:
      - webdist:/out
    command: sh -c "rm -rf /out/* && cp -r /app/dist/* /out/"
    networks:
      - vopli

networks:
  vopli:
    driver: bridge

volumes:
  appdata:
  webdist:
  media:
