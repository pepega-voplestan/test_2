version: "3.8"

services:
  api:
    build:
      context: ./api
    environment:
      DATABASE_PATH: /data/app.db
      SESSION_SECRET: "yJPi^xs{dx)!4cIbyd#oF+aVdtBqyq(H"
      MEDIA_PATH: /media
      NODE_ENV: production
      RESEND_API_KEY: "re_bApfpQdy_3D2pkBpg9tAAjc4XTGK8d3VF"
      EMAIL_FROM: "Вопли <noreply@vopley.net>"

    volumes:
      - appdata:/data
      - media:/media
    expose:
      - "3000"

  media:
    image: nginx:alpine
    volumes:
      - media:/media:ro
      - ./media-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "80"

  nginx:
    image: nginx:alpine
    depends_on:
      - api
      - media
    ports:
      - "3005:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - webdist:/usr/share/nginx/html:ro

  web-build:
    build:
      context: ./web
    volumes:
      - webdist:/out
    command: sh -c "rm -rf /out/* && cp -r /app/dist/* /out/"

volumes:
  appdata:
  webdist:
  media:
