version: "3.8"

services:
  api-dev:
    build:
      context: ./api
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      MEDIA_PATH: /media
      NODE_ENV: ${NODE_ENV}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: "Вопли <noreply@vopley.net>"
      ANNOUNCEMENTS_SECRET: ${ANNOUNCEMENTS_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      ADMIN_COOKIE_SECRET: ${ADMIN_COOKIE_SECRET}
    volumes:
      - appdata-dev:/data
      - media-dev:/media
      - ./api/src:/app/src:ro
    expose:
      - "3000"
    networks:
      - vopli-dev

  media-dev:
    image: nginx:alpine
    volumes:
      - media-dev:/media:ro
      - ./media-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "80"
    networks:
      - vopli-dev

  nginx-dev:
    image: nginx:alpine
    depends_on:
      - api-dev
      - media-dev
    ports:
      - "3006:80"
    volumes:
      - ./nginx-dev.conf:/etc/nginx/conf.d/default.conf:ro
      - webdist-dev:/usr/share/nginx/html:ro
    networks:
      - vopli-dev

  web-build-dev:
    build:
      context: ./web
    volumes:
      - webdist-dev:/out
    command: sh -c "rm -rf /out/* && cp -r /app/dist/* /out/"
    networks:
      - vopli-dev


networks:
  vopli-dev:
    driver: bridge

volumes:
  appdata-dev:
  webdist-dev:
  media-dev:
