<!DOCTYPE html>
<html lang="ru" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Вопли</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              th: {
                page:       'rgb(var(--th-page) / <alpha-value>)',
                feed:       'rgb(var(--th-feed) / <alpha-value>)',
                card:       'rgb(var(--th-card) / <alpha-value>)',
                elevated:   'rgb(var(--th-elevated) / <alpha-value>)',
                inset:      'rgb(var(--th-inset) / <alpha-value>)',
                input:      'rgb(var(--th-input) / <alpha-value>)',
                text:       'rgb(var(--th-text) / <alpha-value>)',
                'text-2':   'rgb(var(--th-text-2) / <alpha-value>)',
                'text-3':   'rgb(var(--th-text-3) / <alpha-value>)',
                'text-4':   'rgb(var(--th-text-4) / <alpha-value>)',
                border:     'rgb(var(--th-border) / <alpha-value>)',
                'border-2': 'rgb(var(--th-border-2) / <alpha-value>)',
                ring:       'rgb(var(--th-ring) / <alpha-value>)',
              }
            }
          }
        }
      }
    </script>
    <style>
      /* ===== Light theme (default) ===== */
      :root {
        --th-page:     240 240 242;
        --th-feed:     233 233 236;
        --th-card:     255 255 255;
        --th-elevated: 224 224 228;
        --th-inset:    240 240 242;
        --th-input:    224 224 228;
        --th-text:      18  18  22;
        --th-text-2:    52  52  60;
        --th-text-3:    96  96 106;
        --th-text-4:   140 140 150;
        --th-border:   196 196 204;
        --th-border-2: 216 216 222;
        --th-ring:       0   0   0;
      }

      /* ===== Dark theme ===== */
      .dark {
        --th-page:      19  19  20;
        --th-feed:      24  24  26;
        --th-card:      30  30  30;
        --th-elevated:  51  51  51;
        --th-inset:     24  24  27;
        --th-input:     39  39  42;
        --th-text:     255 255 255;
        --th-text-2:   228 228 231;
        --th-text-3:   161 161 170;
        --th-text-4:   113 113 122;
        --th-border:    63  63  70;
        --th-border-2:  39  39  42;
        --th-ring:     255 255 255;
      }

      body {
        background-color: rgb(var(--th-page));
        color: rgb(var(--th-text));
        transition: background-color 0.2s, color 0.2s;
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: rgb(var(--th-page));
      }
      ::-webkit-scrollbar-thumb {
        background: rgb(var(--th-elevated));
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgb(var(--th-text-4));
      }
    </style>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
