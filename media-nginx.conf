server {
    listen 80;
    server_name _;

    root /media;
    autoindex off;

    # Deny dotfiles and temp dir
    location ~ /\. {
        deny all;
        return 404;
    }

    # Only serve known image extensions
    location ~* ^/.+\.(webp|jpg|jpeg|png|gif)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff";
        try_files $uri =404;
    }

    # Deny everything else (including directory listing, meta.json, etc.)
    location / {
        return 403;
    }
}
